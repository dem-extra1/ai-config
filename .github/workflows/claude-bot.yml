name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    secrets: inherit
    with:
      setup-r: false
      eager-pr: true
      review-workflow-file: claude-review.yml
